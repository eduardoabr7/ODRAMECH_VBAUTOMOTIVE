<div class="modal-content">
  <div class="modal-header text-white">
    <h5 class="modal-title">{{ title || 'Minha Oficina' }}</h5>
    <button
      type="button"
      class="btn-close btn-close-white"
      aria-label="Close"
      (click)="attemptClose()"
    ></button>
  </div>

  <div class="modal-body bg-light">

    <p class="text-muted mb-3">Gerencie as configurações operacionais da sua oficina.</p>

    <div class="row g-3">
      <div
        *ngFor="let card of cards"
        class="col-12 col-md-6">
        <div
          class="card h-100 shadow-sm border-0 settings-card"
          (click)="openCard(card)"
          style="cursor: pointer;">
          <div class="card-body d-flex align-items-center gap-3 p-3">
            <div
              class="settings-icon rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
              [style.background]="card.iconBg"
              [style.color]="card.iconColor">
              <i [ngClass]="card.iconClass" class="fs-4"></i>
            </div>
            <div class="flex-grow-1 min-width-0">
              <h6 class="mb-1 fw-semibold text-truncate">{{ card.name }}</h6>
              <p class="text-muted small mb-0">{{ card.description }}</p>
            </div>
            <i class="bi bi-chevron-right text-muted flex-shrink-0"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12 text-end">
        <button
          class="btn btn-outline-secondary"
          type="button"
          (click)="attemptClose()">
          Fechar
        </button>
      </div>
    </div>

  </div>
</div>
